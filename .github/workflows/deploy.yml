name: Deploy to VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eu

            cd ~/danielfelipealdana.com
            git pull origin main

            if [ ! -f index.html ]; then
              echo "ERROR: index.html not found after pull"
              exit 1
            fi

            if command -v rsync >/dev/null 2>&1; then
              rsync -av --delete --exclude='.git' ./ /var/www/html/
            else
              find /var/www/html -mindepth 1 -maxdepth 1 -exec rm -rf {} +
              cp -a index.html sobre-mi.html /var/www/html/
              [ -d assets ] && cp -a assets /var/www/html/
            fi

            echo "Deploy completed successfully."
