<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <!-- Grid dots background -->
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.2" fill="#2c7be5" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="400" height="320" fill="url(#dots)"/>

  <!-- Connection lines -->
  <line x1="100" y1="70" x2="200" y2="145" stroke="#2c7be5" stroke-width="1.5" opacity="0.2" stroke-dasharray="4 4"/>
  <line x1="200" y1="145" x2="310" y2="90" stroke="#2c7be5" stroke-width="1.5" opacity="0.25"/>
  <line x1="200" y1="145" x2="290" y2="210" stroke="#2c7be5" stroke-width="1.5" opacity="0.2"/>
  <line x1="100" y1="70" x2="65" y2="170" stroke="#2c7be5" stroke-width="1.5" opacity="0.2"/>
  <line x1="65" y1="170" x2="200" y2="145" stroke="#2c7be5" stroke-width="1.5" opacity="0.18" stroke-dasharray="4 4"/>
  <line x1="310" y1="90" x2="345" y2="170" stroke="#2c7be5" stroke-width="1.5" opacity="0.22"/>
  <line x1="345" y1="170" x2="290" y2="210" stroke="#2c7be5" stroke-width="1.5" opacity="0.2"/>
  <line x1="200" y1="145" x2="160" y2="210" stroke="#2c7be5" stroke-width="1.5" opacity="0.15"/>

  <!-- Data nodes -->
  <circle cx="100" cy="70" r="10" fill="#2c7be5" opacity="0.7"/>
  <circle cx="200" cy="145" r="16" fill="#2c7be5" opacity="0.85"/>
  <circle cx="310" cy="90" r="9" fill="#5b9bf5" opacity="0.65"/>
  <circle cx="290" cy="210" r="12" fill="#2c7be5" opacity="0.55"/>
  <circle cx="65" cy="170" r="7" fill="#5b9bf5" opacity="0.5"/>
  <circle cx="345" cy="170" r="9" fill="#5b9bf5" opacity="0.55"/>
  <circle cx="160" cy="210" r="6" fill="#2c7be5" opacity="0.4"/>

  <!-- Inner highlights on main nodes -->
  <circle cx="200" cy="145" r="6" fill="white" opacity="0.25"/>
  <circle cx="100" cy="70" r="4" fill="white" opacity="0.2"/>
  <circle cx="290" cy="210" r="5" fill="white" opacity="0.2"/>

  <!-- Bar chart element -->
  <rect x="115" y="258" width="18" height="36" rx="3" fill="#2c7be5" opacity="0.2"/>
  <rect x="140" y="244" width="18" height="50" rx="3" fill="#2c7be5" opacity="0.3"/>
  <rect x="165" y="264" width="18" height="30" rx="3" fill="#5b9bf5" opacity="0.22"/>
  <rect x="190" y="234" width="18" height="60" rx="3" fill="#2c7be5" opacity="0.35"/>
  <rect x="215" y="250" width="18" height="44" rx="3" fill="#5b9bf5" opacity="0.25"/>
  <rect x="240" y="240" width="18" height="54" rx="3" fill="#2c7be5" opacity="0.28"/>

  <!-- Trend line over bars -->
  <polyline points="124,252 149,238 174,258 199,228 224,244 249,234"
    stroke="#2c7be5" stroke-width="2" fill="none" opacity="0.45" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small scatter dots -->
  <circle cx="150" cy="50" r="3" fill="#5b9bf5" opacity="0.3"/>
  <circle cx="260" cy="42" r="3.5" fill="#2c7be5" opacity="0.25"/>
  <circle cx="355" cy="55" r="2.5" fill="#5b9bf5" opacity="0.3"/>
  <circle cx="40" cy="110" r="2.5" fill="#2c7be5" opacity="0.25"/>
  <circle cx="370" cy="125" r="3" fill="#5b9bf5" opacity="0.2"/>
  <circle cx="50" cy="250" r="2" fill="#2c7be5" opacity="0.2"/>
  <circle cx="330" cy="260" r="2.5" fill="#5b9bf5" opacity="0.2"/>
</svg>
